<div class="bg-white/60 backdrop-blur-lg w-full border-b border-gray-200">
  <div class="flex justify-between mx-9 items-center h-14">
    <!-- LEFT MENU -->
     <div class="flex gap-8">
        <div class="flex justify-center items-center gap-4">
        <img
          src="https://resources.groww.in/web-assets/img/website-logo/story_default_all_viewed_dark.png"
          alt=""
          class="h-10 w-10"
        />
        <h1 class="text-black text-xl font-medium cursor-pointer">Stocks</h1>
      </div>
    <div class="relative top-2 flex gap-1.5 items-center cursor-pointer">
      @for (item of tabs; track item; let i = $index) {
        <button
          (click)="changeTab(i, item)"
          class="relative pb-4 text-sm font-medium w-20 cursor-pointer"
          [class.text-black]="activeTab === i"
          [class.text-gray-500]="activeTab !== i"
        >
          {{ item }}
        </button>
      }

      <!-- Single moving underline -->
      <div
        class="absolute bottom-0 top-9.5 h-0.5 w-20 bg-[#44475b] transition-transform duration-300 ease-in-out"
        [style.transform]="'translateX(' + activeTab * 86 + 'px)'"
      ></div>
    </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="flex gap-8 items-center bg-white">
        <div class="flex gap-2">
      <button class="border border-gray-300 rounded-md px-3 py-1 text-xs">Terminal</button>

      <button class="border border-gray-300 rounded-md px-3 py-1 text-xs">915</button>
      </div>
      <i class="fa-solid fa-magnifying-glass text-gray-500 text-sm"></i>
      <i class="fa-regular fa-bell text-xl text-black"></i>
    <img [src]="profile()" alt="" class="h-8 w-8 rounded-full" />
    </div>
  </div>
</div>
<div class="flex items-center mr-8 w-full border-b bg-white/60 backdrop-blur-lg border-gray-200">
  <div class="flex items-center h-12 overflow-x-auto hide-scrollbar ml-8 mr-16 w-full">
    <div
      *ngFor="let item of stockPrice()"
      class="flex items-center gap-2 px-8 whitespace-nowrap shrink-0"
    >
      <span class="font-normal text-slate-700 text-sm">
        {{ item.name }}
      </span>

      <span class="text-gray-500 text-sm">
        {{ item.spotPrice }}
      </span>

      <span
        class="text-sm font-light"
        [ngClass]="{
          'text-green-600': !item.decOrincPrice.includes('-'),
          'text-red-600': item.decOrincPrice.includes('-'),
        }"
      >
        {{ item.decOrincPrice }}
      </span>
    </div>
    <div class="border absolute right-5 p-2 rounded-md py-0.5 mx-1.5">
      <i class="fa-solid fa-globe"></i>
    </div>
  </div>
</div>
