<div class="bg-[#f5f5f5] py-20 overflow-hidden">
  <h1 class="text-[42px] font-semibold text-center mb-16">
    Finance simplified, in your language
  </h1>

  <swiper-container #swiper init="false">

    @for (card of cards; track card.id) {
      <swiper-slide>
        <div class="h-105 rounded-[28px] overflow-hidden">
          <img
            [src]="card.image"
            [alt]="card.title"
            class="w-full h-full object-cover"
          />
        </div>
      </swiper-slide>
    }

  </swiper-container>
</div>
