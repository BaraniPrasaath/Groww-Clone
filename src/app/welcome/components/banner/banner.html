<div class="relative h-220 bg-white w-full overflow-hidden">
  <div class="flex flex-col items-center pt-10 relative z-10">
    <div class="relative bg-black text-white w-184">
      <div class="relative w-full overflow-hidden bg-white py-3 border-y">
        <!-- Left fade -->
        <div
          class="absolute left-0 top-0 z-10 h-full w-20 bg-linear-to-r from-white to-transparent"
        ></div>

        <!-- Right fade -->
        <div
          class="absolute right-0 top-0 z-10 h-full w-20 bg-linear-to-l from-white to-transparent"
        ></div>

        <!-- Scrolling content -->
        <div class="flex animate-scroll">
          <!-- First set -->
          <ng-container *ngFor="let item of stockPrice(); trackBy: trackByName">
            <div class="flex items-center gap-3 px-8 whitespace-nowrap shrink-0">
              <span class="text-sm font-medium text-gray-500">
                {{ item.name }}
              </span>

              <span class="text-gray-500 text-sm font-light">
                {{ item.spotPrice }}
              </span>

              <span
                class="text-sm font-light"
                [ngClass]="{
                  'text-green-600': !item.decOrincPrice.includes('-'),
                  'text-red-600': item.decOrincPrice.includes('-'),
                }"
              >
                {{ item.decOrincPrice }}
              </span>
            </div>
          </ng-container>

          <!-- Duplicate for infinite loop -->
          <ng-container *ngFor="let item of stockPrice()">
            <div class="flex items-center gap-3 px-8 whitespace-nowrap shrink-0">
              <span class="font-semibold text-gray-800">
                {{ item.name }}
              </span>

              <span class="text-gray-500">
                {{ item.spotPrice }}
              </span>

              <span
                [ngClass]="{
                  'text-green-600': !item.decOrincPrice.includes('-'),
                  'text-red-600': item.decOrincPrice.includes('-'),
                }"
              >
                {{ item.decOrincPrice }}
              </span>
            </div>
          </ng-container>
        </div>
      </div>
    </div>

    <h1 class="text-[85px] text-gray-700 font-medium leading-none">Groww your wealth</h1>

    <button
      class="mt-8 px-8 py-3 font-semibold text-lg text-white rounded-full cursor-pointer bg-[#02B686] hover:bg-[#08af83]"
      routerLink="/get"
    >
      Get started
    </button>
  </div>

  <div class="h-full">
    <img
      src="https://resources.groww.in/web-assets/story_assets/landing-page/home_page/cityScape.svg"
      alt=""
      class="absolute top-10 left-1/2 -translate-x-1/2 w-[120%] max-w-none"
    />
  </div>
</div>
