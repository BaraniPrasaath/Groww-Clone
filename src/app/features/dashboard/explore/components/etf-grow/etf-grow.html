<div class="max-w-4xl ml-4 p-4 font-sans">
  <h2 class="text-xl font-medium text-gray-800 mb-4">ETFs by Groww</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
    <div
      *ngFor="let etf of etfs()"
      class="border border-gray-200 rounded-xl p-4 hover:shadow-md transition-shadow cursor-pointer bg-white"
    >
      <img
        [src]="etf.logo"
        [alt]="etf.name"
        class="w-8 h-8 mb-3 rounded-md border border-gray-100"
      />
      
      <h3 class="font-normal text-xs text-gray-700 mb-4 truncate">{{ etf.name }}</h3>
      <div *ngIf="etf.price; else nfoView">

      <div class="font-medium text-gray-600">{{ etf.price | currency:'INR' }}</div>

      <div
        [ngClass]="etf.isPositive ? 'text-green-600' : 'text-red-600'"
        class="font-normal text-sm"
      >
        {{ etf.changeValue }} {{ etf.changePercent }}
      </div>
      </div>
      <ng-template #nfoView>
    <p>NFO</p>
    <span class="bg-green-100 text-green-600 rounded px-1 py-0.5 text-[10px]">{{ etf.nfoStatus }}</span>
  </ng-template>
    </div>
  </div>

  <div
    class="mt-6 text-[#00b386] text-sm font-semibold cursor-pointer hover:underline inline-flex items-center"
    routerLink="/stocks/etf-nfo"
  >
    See all ETFs
    <i class="fa-solid fa-angle-right ml-2"></i>
  </div>
</div>
