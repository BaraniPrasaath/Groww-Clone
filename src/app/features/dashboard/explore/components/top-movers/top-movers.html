<div class="max-w-225 p-4 font-sans ml-4">
  <h2 class="text-[22px] font-medium text-slate-800 mb-5 tracking-tight">Top movers today</h2>

  <div class="flex items-center gap-3 mb-6">
    <button
      class="px-5 py-2.5 rounded-full border border-[#44475b] bg-[#f8f9fa] text-[#44475b] text-xs font-medium shadow-sm transition-all cursor-pointer"
    >
      Gainers
    </button>
    <button
      class="px-5 py-2.5 rounded-full border border-[#e8e9eb] bg-white text-[#44475b] text-xs font-medium hover:border-[#44475b] transition-all cursor-pointer"
    >
      Losers
    </button>
    <button
      class="px-5 py-2.5 rounded-full border border-[#e8e9eb] bg-white text-[#44475b] text-xs font-medium hover:border-[#44475b] transition-all cursor-pointer"
    >
      Volume shockers
    </button>
    <button
      class="px-5 py-2.5 rounded-full border border-[#44475b] bg-white text-[#44475b] text-xs font-medium flex items-center gap-1.5 hover:bg-gray-50 transition-all cursor-pointer"
    >
      NIFTY 100
      <i class="fa-solid fa-angle-down"></i>
    </button>
  </div>

  <div class="border border-[#e8e9eb] rounded-xl overflow-hidden bg-white shadow-sm">
    <div
      class="grid grid-cols-[1.5fr_1fr_1.2fr_1fr] px-5 py-4 bg-[#f8f9fa] border-b border-[#e8e9eb] text-[11px] text-[#7b809a] font-medium"
    >
      <div class="pl-2 text-center">Company</div>
      <div></div>
      <div class="text-right">Market price (1D)</div>
      <div class="text-right pr-2">Volume</div>
    </div>

    <div class="flex flex-col">
      <div
        *ngFor="let stock of stocks()"
        class="group grid grid-cols-[1.5fr_1fr_1.2fr_1fr] items-center px-5 py-4 border-b border-[#e8e9eb] last:border-b-0 hover:bg-[#f8f9fa] transition-colors cursor-pointer relative"
      >
        <div class="flex items-center gap-4 pl-2">
          <div
            class="w-10 h-10 rounded border border-[#e8e9eb] overflow-hidden flex items-center justify-center p-0.5 bg-white"
          >
            <img [src]="stock.logo" [alt]="stock.name" class="w-full h-full object-contain" />
          </div>
          <span class="font-medium text-[12px] text-[#44475b]">{{ stock.name }}</span>
        </div>

        <div class="flex items-center justify-center relative w-full h-8 px-4">
          <svg preserveAspectRatio="none" viewBox="0 0 100 30" class="w-full h-full">
            <path
              d="M0,20 L10,18 L20,22 L30,15 L40,16 L50,10 L60,12 L70,5 L80,8 L90,2 L100,0"
              fill="none"
              stroke="#00b386"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <line
              x1="0"
              y1="28"
              x2="100"
              y2="28"
              stroke="#d1d5db"
              stroke-width="1"
              stroke-dasharray="2 2"
            />
          </svg>
        </div>

        <div class="text-right flex flex-col justify-center">
          <span class="font-light text-[15px] text-[#44475b]">{{ stock.price }}</span>
          <span class="text-[13px] font-medium text-[#00b386] mt-0.5">{{ stock.change }}</span>
        </div>

        <div class="text-right pr-2 relative flex items-center justify-end h-full">
          <span
            class="text-[14px] font-normal text-[#44475b] group-hover:opacity-0 transition-opacity duration-200"
          >
            {{ stock.volume }}
          </span>

          <div
            class="absolute right-0 top-1/2 -translate-y-1/2 flex items-center gap-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none group-hover:pointer-events-auto"
          >
            <button
              class="w-8.5 h-8.5 rounded-lg bg-white border border-[#e8e9eb] flex items-center justify-center text-gray-500 hover:text-green-600 hover:border-green-600"
            >
              <i class="fa-solid fa-diagram-project"></i>
            </button>
            <button
              class="w-8.5 h-8.5 rounded-lg bg-white border border-[#e8e9eb] flex items-center justify-center text-gray-500 hover:text-green-600 hover:border-green-600 shadow-sm transition-colors"
            >
              <i class="fa-regular fa-bookmark"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-5">
    <a
      href="#"
      class="inline-flex items-center gap-1 text-[14px] font-semibold text-[#00b386] hover:underline cursor-pointer"
    >
      See more
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          fill-rule="evenodd"
          d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
          clip-rule="evenodd"
        />
      </svg>
    </a>
  </div>
</div>
