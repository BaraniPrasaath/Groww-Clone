<div class="max-w-4xl ml-4 p-4 font-sans text-gray-800">
  <h2 class="text-xl font-medium text-gray-800 mb-4.5">Stocks in news today</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div
      *ngFor="let item of newsStocks()"
      class="border border-gray-200 rounded-xl p-4 hover:shadow-md transition-shadow cursor-pointer bg-white flex flex-col h-full"
    >
      <div class="flex flex-col items-start mb-2">
        <div class="flex items-center gap-3">
          <img
            [src]="item.logo"
            [alt]="item.name"
            class="w-10 h-10 rounded border border-gray-100"
          />
        </div>
        <div class="flex items-center py-2 justify-between w-full">
          <div>
            <h3 class="font-semibold text-gray-800 text-xs">{{ item.name }}</h3>
          </div>
          <div>
            <span
              class="font-medium text-xs"
              [ngClass]="item.isPositive ? 'text-green-600' : 'text-red-500'"
            >
              {{ item.change }}
            </span>
          </div>
        </div>
      </div>
      <div class="border-l h-10 border-gray-300 mb-4">
        <p class="text-xs text-gray-600 leading-relaxed ml-2 grow line-clamp-2">
          {{ item.snippet }}
        </p>
      </div>

      <div class="text-[11px] text-gray-500 font-medium">
        {{ item.time | timeAgoPipe }}
      </div>
    </div>
  </div>

  <div
    class="mt-6 text-[#00b386] text-sm font-semibold cursor-pointer hover:underline inline-flex items-center"
  >
    See more news
    <i class="fa-solid fa-angle-right ml-2"></i>
  </div>
</div>
