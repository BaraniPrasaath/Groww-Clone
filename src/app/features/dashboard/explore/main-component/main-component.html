<div
  class="fixed top-0 left-0 w-full z-9999 transition-all duration-300 ease-in-out"
  [class.opacity-100]="isSticky"
  [class.opacity-0]="!isSticky"
  [class.translate-y-0]="isSticky"
  [class.-translate-y-full]="!isSticky"
>
  <app-floating-header></app-floating-header>
</div>
<div class="flex flex-col gap-4 bg-white min-h-screen max-w-screen">
  
  <div 
    [class.opacity-0]="isSticky"
    [class.pointer-events-none]="isSticky"
    class="transition-opacity duration-300 ease-in-out flex flex-col w-full">
    <div class="w-full"><app-header></app-header></div>
    <div class="w-full"><app-sub-header></app-sub-header></div>
  </div>

  <div class="flex w-full mt-4"> <div class="flex-2">
      <app-recently-viewed></app-recently-viewed>
      <app-most-bought-stocks></app-most-bought-stocks>
      <app-top-movers></app-top-movers>
      <app-most-traded></app-most-traded>
      <app-top-intrady></app-top-intrady>
      <app-sector-trending></app-sector-trending>
      <app-most-bought-etf></app-most-bought-etf>
      <app-etf-grow></app-etf-grow>
      <app-stock-news></app-stock-news>
    </div>
    <div class="flex-1">
      <app-your-investments></app-your-investments>
      <app-products-tools></app-products-tools>
      <app-trading-screens></app-trading-screens>
    </div>
  </div>
  <app-app-footer></app-app-footer>
</div>
