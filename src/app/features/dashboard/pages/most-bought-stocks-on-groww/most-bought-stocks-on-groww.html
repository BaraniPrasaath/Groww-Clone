<div class="min-h-screen bg-gray-50 py-8 px-4 font-sans w-full">
  <div class="max-w-600 mx-8">
    <h1 class="text-[#44475b] text-[22px] font-medium mb-6">Most bought stocks on Groww</h1>

    <div class="flex flex-col lg:flex-row gap-6 items-start justify-between w-full">
      <div class="grow w-full bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
        <div
          class="grid grid-cols-12 gap-4 px-6 py-4 border-b border-gray-100 text-[13px] font-medium text-gray-500 bg-white"
        >
          <div class="col-span-6 lg:col-span-5">Company</div>
          <div class="col-span-6 lg:col-span-4 text-right">Market Price(1D)</div>
          <div class="col-span-3 text-right hidden lg:block">Volume</div>
        </div>

        <div
          *ngFor="let stock of stocks; let last = last"
          class="grid grid-cols-12 gap-4 px-6 py-4.5 items-center hover:bg-gray-50 transition-colors"
          [ngClass]="{ 'border-b border-gray-100': !last }"
        >
          <div class="col-span-6 lg:col-span-5 flex items-center gap-4">
            <div
              class="w-10 h-10 rounded-md border border-gray-100 flex items-center justify-center p-1 bg-white overflow-hidden shadow-sm"
            >
              <img [src]="stock.logo" [alt]="stock.name" class="w-full h-full object-contain" />
            </div>
            <span class="text-[#44475b] font-medium text-[15px] truncate">{{ stock.name }}</span>
          </div>

          <div class="col-span-6 lg:col-span-4 flex items-center justify-end gap-2 lg:gap-8">
            <div class="w-20 hidden md:block">
              <svg
                *ngIf="stock.isUp"
                viewBox="0 0 100 30"
                class="w-full stroke-[#00d09c] fill-none"
                stroke-width="1.5"
              >
                <path d="M0,25 Q10,20 20,22 T40,15 T60,10 T80,5 T100,2" />
                <line
                  x1="0"
                  y1="15"
                  x2="100"
                  y2="15"
                  stroke="#e5e7eb"
                  stroke-width="1"
                  stroke-dasharray="4,4"
                  class="stroke-gray-300"
                />
              </svg>
              <svg
                *ngIf="!stock.isUp"
                viewBox="0 0 100 30"
                class="w-full stroke-[#eb5b3c] fill-none"
                stroke-width="1.5"
              >
                <path d="M0,5 Q10,10 20,8 T40,15 T60,20 T80,25 T100,28" />
                <line
                  x1="0"
                  y1="15"
                  x2="100"
                  y2="15"
                  stroke="#e5e7eb"
                  stroke-width="1"
                  stroke-dasharray="4,4"
                  class="stroke-gray-300"
                />
              </svg>
            </div>

            <div class="text-right whitespace-nowrap">
              <div class="text-[#44475b] text-[15px] font-medium">{{ stock.price }}</div>
              <div
                class="text-[13px] font-medium mt-0.5"
                [ngClass]="stock.isUp ? 'text-[#00d09c]' : 'text-[#eb5b3c]'"
              >
                <span *ngIf="stock.isUp">+</span>{{ stock.change }} ({{ stock.changePercent }})
              </div>
            </div>
          </div>

          <div class="col-span-3 text-right hidden lg:block text-[#44475b] text-[14px]">
            {{ stock.volume }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
