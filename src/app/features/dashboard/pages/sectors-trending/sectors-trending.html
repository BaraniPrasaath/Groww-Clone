<div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm font-sans text-[#44475b]">
  <h2 class="text-xl font-semibold mb-6">Trending sectors</h2>

  <div class="space-y-8">
    <div class="grid grid-cols-12 text-[13px] text-gray-500 font-medium mb-2">
      <div class="col-span-3">Sector</div>
      <div class="col-span-6 text-center">Gainers/Losers (1D)</div>
      <div class="col-span-3 text-right">1D price change</div>
    </div>

    <div *ngFor="let sector of sectors" class="grid grid-cols-12 items-center gap-4">
      <div class="col-span-3 flex items-center gap-3">
        <span class="text-xl">{{ sector.icon }}</span>
        <span class="font-medium text-[14px]">{{ sector.name }}</span>
      </div>

      <div class="col-span-6 flex flex-col gap-1">
        <div class="flex justify-between text-[11px] font-bold text-gray-500">
          <span>{{ sector.gainers }}</span>
          <span>{{ sector.losers }}</span>
        </div>
        <div class="w-full h-1.5 flex rounded-full overflow-hidden">
          <div
            class="h-full bg-[#00d09c]"
            [style.width.%]="getBarWidth(sector.gainers, sector.losers)"
          ></div>
          <div
            class="h-full bg-[#eb5b3c]"
            [style.width.%]="100 - getBarWidth(sector.gainers, sector.losers)"
          ></div>
        </div>
      </div>

      <div class="col-span-3 text-right font-medium text-[#00d09c]">
        {{ sector.priceChange }}
      </div>
    </div>
  </div>
</div>
