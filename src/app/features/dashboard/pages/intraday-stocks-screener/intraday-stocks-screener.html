<div class="min-h-screen bg-gray-50 py-8 px-4 font-sans text-[#44475b]">
  <div class="max-w-235 mx-auto">
    
    <div class="mb-6 flex items-center gap-3">
      <h1 class="text-2xl font-semibold">Intraday Stocks Screener</h1>
      <button class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
    </div>

    <div class="flex flex-wrap items-center gap-3 mb-6">
      <button class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
      </button>
      
      <div class="w-px h-6 bg-gray-300 mx-1"></div>

      <button class="px-4 py-1.5 rounded-full border border-gray-200 bg-white text-[13px] font-medium flex items-center gap-2 hover:bg-gray-50">
        Price change >1% 
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
      <button class="px-4 py-1.5 rounded-full border border-gray-200 bg-white text-[13px] font-medium flex items-center gap-2 hover:bg-gray-50">
        52W Performance
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
      <button class="px-4 py-1.5 rounded-full border border-gray-200 bg-white text-[13px] font-medium flex items-center gap-2 hover:bg-gray-50">
        RSI
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
      <button class="px-4 py-1.5 rounded-full border border-gray-200 bg-white text-[13px] font-medium flex items-center gap-2 hover:bg-gray-50">
        MACD
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
      
      <button class="text-[#00d09c] text-[13px] font-medium ml-2 hover:underline">
        Clear all
      </button>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 overflow-x-auto shadow-sm">
      <table class="w-full text-sm text-left whitespace-nowrap">
        
        <thead class="text-[13px] text-gray-500 font-medium border-b border-gray-100 bg-[#fbfbfb]">
          <tr>
            <th class="py-4 px-6 font-medium">Company</th>
            <th class="py-4 px-6 font-medium"></th> <th class="py-4 px-6 font-medium">
              <div class="flex items-center gap-1 justify-end">Market price <span class="text-[10px]">⇕</span></div>
            </th>
            <th class="py-4 px-6 font-medium">
              <div class="flex items-center gap-1 justify-end">1D price change <span class="text-[10px]">⇕</span></div>
            </th>
            <th class="py-4 px-6 font-medium">
              <div class="flex items-center gap-1 justify-end">1D volume <span class="text-[10px]">⌄</span></div>
            </th>
            <th class="py-4 px-6 font-medium text-right">1W avg vol diff</th>
            <th class="py-4 px-6 font-medium text-right">52W performance</th>
          </tr>
        </thead>

        <tbody class="divide-y divide-gray-100">
          <tr *ngFor="let stock of stocks" class="hover:bg-gray-50 transition-colors">
            
            <td class="py-4 px-6">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded border border-gray-100 flex items-center justify-center p-0.5 bg-white shadow-sm shrink-0">
                  <img [src]="stock.logo" [alt]="stock.name" class="w-full h-full object-contain">
                </div>
                <span class="font-medium text-[14px] text-[#44475b]">{{ stock.name }}</span>
              </div>
            </td>

            <td class="py-4 px-2 w-28">
              <div class="w-24">
                <svg *ngIf="stock.isUp" viewBox="0 0 100 24" class="w-full stroke-[#00d09c] fill-none" stroke-width="1.5">
                  <path d="M0,20 Q15,15 30,18 T60,10 T80,5 T100,2" />
                  <line x1="0" y1="23" x2="100" y2="23" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,2" class="stroke-gray-300"/>
                </svg>
                <svg *ngIf="!stock.isUp" viewBox="0 0 100 24" class="w-full stroke-[#eb5b3c] fill-none" stroke-width="1.5">
                  <path d="M0,2 Q20,5 40,15 T70,10 T85,18 T100,22" />
                  <line x1="0" y1="23" x2="100" y2="23" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,2" class="stroke-gray-300"/>
                </svg>
              </div>
            </td>

            <td class="py-4 px-6 text-right font-medium text-[14px]">
              {{ stock.price }}
            </td>

            <td class="py-4 px-6 text-right font-medium text-[14px]"
                [ngClass]="stock.isUp ? 'text-[#00d09c]' : 'text-[#eb5b3c]'">
              {{ stock.change }} ({{ stock.changePercent }})
            </td>

            <td class="py-4 px-6 text-right text-[14px]">
              {{ stock.volume }}
            </td>

            <td class="py-4 px-6 text-right font-medium text-[14px]"
                [ngClass]="stock.volDiffIsUp ? 'text-[#00d09c]' : 'text-[#eb5b3c]'">
              {{ stock.volDiff }}
            </td>

            <td class="py-4 px-6">
              <div class="flex items-center justify-end text-[11px] text-gray-400 gap-2 font-medium">
                <span>L</span>
                <div class="w-16 h-0.5 bg-gray-200 relative">
                  <div class="absolute w-1 h-2.5 bg-gray-600 top-1/2 -translate-y-1/2 rounded-full" 
                       [style.left.%]="stock.fiftyTwoWeekPos">
                  </div>
                </div>
                <span>H</span>
              </div>
            </td>

          </tr>
        </tbody>
      </table>
    </div>
    
  </div>
</div>
