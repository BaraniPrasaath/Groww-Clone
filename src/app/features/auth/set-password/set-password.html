<!-- Background overlay -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <!-- Modal -->
  <div class="bg-white rounded-2xl w-100 px-8 py-4 relative shadow-xl">
    <!-- Heading -->
    <div>
      <div class="flex justify-center p-2">
        <i class="fa-regular fa-circle text-6xl text-emerald-500"></i>
        <i class="fa-solid fa-lock text-3xl text-emerald-500 absolute top-9"></i>
      </div>
      <h2 class="text-lg font-semibold text-center text-gray-800">Set New Groww Password</h2>
    </div>

    <!-- Description -->
    <p class="text-center text-gray-500 mt-5 text-xs">
      We Value Security, Password helps keep your Account Safe & Secure.
    </p>

    <!-- Password Inputs -->
    <div class="flex justify-center gap-3 mt-10">
      <input
        type="text"
        placeholder="Set Password"
        class="px-4 py-2 text-sm border border-gray-300 rounded-md"
        [(ngModel)]="newPassword"
      />
    </div>
    <!-- Password Inputs -->
    <div class="flex justify-center gap-3 mt-10">
      <input
        type="text"
        placeholder="Conform Password"
        class="px-4 py-2 text-sm border border-gray-300 rounded-md"
        [(ngModel)]="conformPassword"
      />
    </div>

    <!-- Button -->
    <div class="flex justify-center mt-8">
      <button
        class="bg-emerald-500 hover:bg-emerald-600 transition text-white font-medium text-sm px-6 py-2 rounded-md"
        (click)="onSetPassword()"
      >
        SET Password
      </button>
    </div>

    <!-- Email + logout -->
    <div class="text-center mt-6 text-gray-400">
      <span class="text-xs">s**************s@gmail.com</span>

      <button class="text-emerald-500 font-medium ml-2 text-xs hover:underline">Logout</button>
    </div>
  </div>
</div>
