<!-- Background overlay -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <!-- Modal -->
  <div class="bg-white rounded-2xl w-100 p-4 relative shadow-xl">
    <!-- Close button -->
    <button class="absolute top-5 right-5 text-gray-500 hover:text-black text-xl">✕</button>

    <!-- Heading -->
    <h2 class="text-2xl font-semibold text-center text-gray-800">Enter OTP</h2>

    <!-- Description -->
    <p class="text-center text-gray-500 mt-5 text-sm">
      Enter the verification code sent to
      <span class="font-semibold text-gray-700 text-sm"> 7010089425 </span>
    </p>

    <!-- OTP Inputs -->
    <div class="flex justify-center gap-3 mt-10">
      <input
        type="text"
        placeholder="Enter OTP"
        class="px-2 py-3 text-sm border border-gray-300 rounded-md w-80"
        [(ngModel)]="inputOTP"
      />
    </div>

    <!-- Timer -->
    <p class="text-center text-gray-400 text-sm mt-10">
      Resend OTP in
      <span class="font-bold text-gray-600">{{ time() }} seconds </span>
    </p>

    <!-- Button -->
    <div class="flex justify-center mt-8">
      <button
        class="bg-emerald-500 hover:bg-emerald-600 transition text-white font-medium text-sm px-6 py-3 rounded-lg"
        (click)="otpVerify()"
      >
        Confirm OTP
      </button>
    </div>

    <!-- Email + logout -->
    <div class="text-center mt-6 text-gray-400">
      <span class="text-xs">s**************s@gmail.com</span>

      <button class="text-emerald-500 font-medium ml-2 text-xs hover:underline">Logout</button>
    </div>
  </div>
</div>
